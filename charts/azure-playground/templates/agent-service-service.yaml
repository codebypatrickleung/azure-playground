apiVersion: v1
kind: Service
metadata:
  name: {{ include "azure-playground.name" . }}-agent-service
  labels:
    {{- include "azure-playground.agentService.labels" . | nindent 4 }}
spec:
  type: {{ .Values.agentService.service.type }}
  selector:
    {{- include "azure-playground.agentService.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.agentService.service.port }}
      targetPort: http
