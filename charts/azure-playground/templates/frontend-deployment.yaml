apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "azure-playground.name" . }}-frontend
  labels:
    {{- include "azure-playground.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "azure-playground.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "azure-playground.frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_LLM_SERVICE_URL
              value: "http://{{ include "azure-playground.name" . }}-agent-service:{{ .Values.agentService.service.port }}"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
