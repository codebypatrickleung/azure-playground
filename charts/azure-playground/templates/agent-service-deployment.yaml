apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "azure-playground.name" . }}-agent-service
  labels:
    {{- include "azure-playground.agentService.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentService.replicaCount }}
  selector:
    matchLabels:
      {{- include "azure-playground.agentService.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "azure-playground.agentService.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: agent-service
          image: "{{ .Values.agentService.image.repository }}:{{ .Values.agentService.image.tag }}"
          imagePullPolicy: {{ .Values.agentService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "azure-playground.name" . }}-agent-service-config
                  key: ENVIRONMENT
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure-playground.name" . }}-agent-service-secrets
                  key: AZURE_OPENAI_ENDPOINT
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure-playground.name" . }}-agent-service-secrets
                  key: NEWS_API_KEY
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.agentService.resources | nindent 12 }}
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "azure-playground.name" . }}-kv
