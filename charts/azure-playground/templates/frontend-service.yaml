apiVersion: v1
kind: Service
metadata:
  name: {{ include "azure-playground.name" . }}-frontend
  labels:
    {{- include "azure-playground.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "azure-playground.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: http
