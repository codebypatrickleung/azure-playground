apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azure-playground
  namespace: azure-playground
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/azure-playground
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: Secret
      name: azure-playground-values
      valuesKey: values.yaml
  values:
    frontend:
      replicaCount: 1
      service:
        type: LoadBalancer
        port: 80
    llmService:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 5001
