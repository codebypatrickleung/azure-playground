services:
  frontend:
    build: ./app/frontend
    ports:
      - "8080:80"
    depends_on:
      - llm-service

  llm-service:
    build: ./app/llm-service
    ports:
      - "5001:5001"
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
